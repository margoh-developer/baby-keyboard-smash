<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Baby Keyboard Smash!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif;
            cursor: none;
        }

        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .shape {
            position: absolute;
            pointer-events: none;
            animation: float 3s ease-out forwards;
            font-size: 80px;
            z-index: 10;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-150px) scale(1.2) rotate(180deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-300px) scale(0.5) rotate(360deg);
                opacity: 0;
            }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: ripple 1s ease-out forwards;
            z-index: 5;
        }

        @keyframes ripple {
            0% {
                width: 0;
                height: 0;
                opacity: 0.6;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }

        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }

        #startOverlay h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #startBtn {
            padding: 20px 60px;
            font-size: 2em;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #startBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        .instructions {
            margin-top: 30px;
            font-size: 1.2em;
            opacity: 0.9;
            line-height: 1.6;
        }

        #settingsPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 2000;
            display: none;
            min-width: 300px;
            color: #333;
        }

        #settingsPanel h2 {
            margin-bottom: 20px;
            color: #667eea;
        }

        .setting-item {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-item label {
            font-size: 1.1em;
        }

        .setting-item input[type="range"] {
            width: 150px;
        }

        .close-settings {
            margin-top: 20px;
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.1em;
        }

        .mode-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1.2em;
            color: #333;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .mode-indicator.show {
            opacity: 1;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confetti-fall 2s ease-out forwards;
            z-index: 8;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(500px) rotate(720deg) scale(0);
                opacity: 0;
            }
        }

        .trail {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            pointer-events: none;
            animation: trail-fade 1s ease-out forwards;
            z-index: 7;
        }

        @keyframes trail-fade {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }

        /* Touch areas for mobile */
        .touch-zone {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="startOverlay">
        <h1>🎉 Baby Keyboard Smash! 🎉</h1>
        <button id="startBtn">Mulai!</button>
        <div class="instructions">
            <p>Tekan sembarang tombol untuk melihat keajaiban! ✨</p>
            <p>Mode: Tekan 1-4 | Pengaturan: Tekan S</p>
            <p>Full Screen: Tekan F11</p>
        </div>
    </div>

    <div id="settingsPanel">
        <h2>⚙️ Pengaturan</h2>
        <div class="setting-item">
            <label>Volume Suara:</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
        </div>
        <div class="setting-item">
            <label>Ukuran Efek:</label>
            <input type="range" id="sizeSlider" min="50" max="150" value="100">
        </div>
        <div class="setting-item">
            <label>Kecepatan Animasi:</label>
            <input type="range" id="speedSlider" min="1" max="5" value="3">
        </div>
        <button class="close-settings" onclick="closeSettings()">Tutup</button>
    </div>

    <div class="mode-indicator" id="modeIndicator">Mode: Bentuk</div>

    <div class="touch-zone" id="touchZone"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // ==================== KONFIGURASI ====================
        const CONFIG = {
            colors: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B500', '#6C5CE7'],
            shapes: ['●', '■', '▲', '◆', '★', '♥', '♦', '♣', '♠', '⬟', '⬢', '◉'],
            letters: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split(''),
            animals: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐤', '🦆', '🦅', '🦉', '🦇', '🐺', '🐗', '🐴', '🦄', '🐝', '🐛', '🦋', '🐌', '🐞', '🐜', '🦟', '🦗', '🕷', '🦂', '🐢', '🐍', '🦎', '🦖', '🦕', '🐙', '🦑', '🦐', '🦞', '🦀', '🐡', '🐠', '🐟', '🐬', '🐳', '🐋', '🦈', '🐊', '🐅', '🐆', '🦓', '🦍', '🦧', '🐘', '🦛', '🦏', '🐪', '🐫', '🦒', '🦘', '🐃', '🐂', '🐄', '🐎', '🐖', '🐏', '🐑', '🦙', '🐐', '🦌', '🐕', '🐩', '🦮', '🐕‍🦺', '🐈', '🐈‍⬛', '🐓', '🦃', '🦚', '🦜', '🦢', '🦩', '🕊', '🐇', '🦝', '🦨', '🦡', '🦦', '🦥', '🐁', '🐀', '🐿', '🦔'],
            emojis: ['😀', '😃', '😄', '😁', '😆', '😅', '😂', '🤣', '😊', '😇', '🙂', '🙃', '😉', '😌', '😍', '🥰', '😘', '😗', '😙', '😚', '😋', '😛', '😝', '😜', '🤪', '🤨', '🧐', '🤓', '😎', '🥸', '🤩', '🥳', '😏', '😒', '😞', '😔', '😟', '😕', '🙁', '☹️', '😣', '😖', '😫', '😩', '🥺', '😢', '😭', '😤', '😠', '😡', '🤬', '🤯', '😳', '🥵', '🥶', '😱', '😨', '😰', '😥', '😓', '🤗', '🤔', '🤭', '🤫', '🤥', '😶', '😐', '😑', '😬', '🙄', '😯', '😦', '😧', '😮', '😲', '🥱', '😴', '🤤', '😪', '😵', '🤐', '🥴', '🤢', '🤮', '🤧', '😷', '🤒', '🤕', '🤑', '🤠', '😈', '👿', '👹', '👺', '🤡', '💩', '👻', '💀', '☠️', '👽', '👾', '🤖', '🎃', '😺', '😸', '😹', '😻', '😼', '😽', '🙀', '😿', '😾'],
            sounds: {
                notes: [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25],
                types: ['sine', 'triangle', 'square', 'sawtooth']
            }
        };

        let currentMode = 1; // 1: shapes, 2: letters, 3: mixed, 4: animals
        let isStarted = false;
        let audioContext = null;
        let settings = {
            volume: 0.5,
            size: 1,
            speed: 1
        };

        // ==================== AUDIO ====================
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound() {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            const note = CONFIG.sounds.notes[Math.floor(Math.random() * CONFIG.sounds.notes.length)];
            const type = CONFIG.sounds.types[Math.floor(Math.random() * CONFIG.sounds.types.length)];
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = note;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(settings.volume * 0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // ==================== VISUAL EFFECTS ====================
        function createShape(x, y) {
            const shape = document.createElement('div');
            shape.className = 'shape';
            shape.style.left = x + 'px';
            shape.style.top = y + 'px';
            shape.style.color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
            shape.style.fontSize = (80 * settings.size) + 'px';
            
            let content;
            switch(currentMode) {
                case 1: // Shapes
                    content = CONFIG.shapes[Math.floor(Math.random() * CONFIG.shapes.length)];
                    break;
                case 2: // Letters
                    content = CONFIG.letters[Math.floor(Math.random() * CONFIG.letters.length)];
                    break;
                case 3: // Mixed
                    const all = [...CONFIG.shapes, ...CONFIG.letters, ...CONFIG.emojis];
                    content = all[Math.floor(Math.random() * all.length)];
                    break;
                case 4: // Animals
                    content = CONFIG.animals[Math.floor(Math.random() * CONFIG.animals.length)];
                    break;
                default:
                    content = CONFIG.shapes[0];
            }
            
            shape.textContent = content;
            document.body.appendChild(shape);
            
            // Adjust animation speed
            shape.style.animationDuration = (3 / settings.speed) + 's';
            
            setTimeout(() => shape.remove(), (3000 / settings.speed));
        }

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = (x - 150) + 'px';
            ripple.style.top = (y - 150) + 'px';
            ripple.style.border = `3px solid ${CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)]}`;
            document.body.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 1000);
        }

        function createConfetti(x, y) {
            for (let i = 0; i < 10; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = x + 'px';
                confetti.style.top = y + 'px';
                confetti.style.backgroundColor = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                
                const angle = (Math.PI * 2 * i) / 10;
                const velocity = 100 + Math.random() * 100;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                confetti.style.setProperty('--vx', vx + 'px');
                confetti.style.setProperty('--vy', vy + 'px');
                
                document.body.appendChild(confetti);
                
                // Custom animation for each confetti
                confetti.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${vx}px, ${vy + 200}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: 1500 + Math.random() * 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                }).onfinish = () => confetti.remove();
            }
        }

        function createTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'trail';
            trail.style.left = (x - 10) + 'px';
            trail.style.top = (y - 10) + 'px';
            trail.style.backgroundColor = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
            document.body.appendChild(trail);
            
            setTimeout(() => trail.remove(), 1000);
        }

        // ==================== INPUT HANDLING ====================
        function handleInput(x, y) {
            if (!isStarted) return;
            
            createShape(x, y);
            createRipple(x, y);
            createConfetti(x, y);
            createTrail(x, y);
            playSound();
        }

        // Keyboard events - BLOCK ALL except F11
        document.addEventListener('keydown', (e) => {
            // Always prevent default for all keys except F11
            if (e.key !== 'F11') {
                e.preventDefault();
                e.stopPropagation();
            }
            
            if (!isStarted) return;
            
            // Mode switching
            if (e.key >= '1' && e.key <= '4') {
                currentMode = parseInt(e.key);
                showModeIndicator();
                return;
            }
            
            // Settings
            if (e.key === 's' || e.key === 'S') {
                toggleSettings();
                return;
            }
            
            // Random position for keyboard input
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            handleInput(x, y);
        }, true);

        // Mouse/Touch events
        document.addEventListener('click', (e) => {
            if (!isStarted) return;
            if (e.target.closest('#settingsPanel')) return;
            handleInput(e.clientX, e.clientY);
        });

        document.addEventListener('touchstart', (e) => {
            if (!isStarted) return;
            e.preventDefault();
            for (let touch of e.touches) {
                handleInput(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!isStarted) return;
            e.preventDefault();
            for (let touch of e.touches) {
                if (Math.random() > 0.7) { // Don't create too many on drag
                    handleInput(touch.clientX, touch.clientY);
                }
            }
        }, { passive: false });

        // ==================== UI FUNCTIONS ====================
        function showModeIndicator() {
            const indicator = document.getElementById('modeIndicator');
            const modes = ['', 'Bentuk', 'Huruf & Angka', 'Campuran', 'Hewan'];
            indicator.textContent = `Mode: ${modes[currentMode]}`;
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 2000);
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function closeSettings() {
            document.getElementById('settingsPanel').style.display = 'none';
        }

        // ==================== START GAME ====================
        document.getElementById('startBtn').addEventListener('click', () => {
            initAudio();
            isStarted = true;
            document.getElementById('startOverlay').style.display = 'none';
            
            // Try to go fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }
        });

        // Settings listeners
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            settings.volume = e.target.value / 100;
        });

        document.getElementById('sizeSlider').addEventListener('input', (e) => {
            settings.size = e.target.value / 100;
        });

        document.getElementById('speedSlider').addEventListener('input', (e) => {
            settings.speed = e.target.value;
        });

        // ==================== BABY LOCK ====================
        // Prevent context menu
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });

        // Prevent double-tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Prevent scroll
        document.addEventListener('scroll', (e) => {
            e.preventDefault();
            window.scrollTo(0, 0);
        }, { passive: false });

        // Block ALL function keys except F11
        const blockedKeys = [
            'F1', 'F2', 'F3', 'F4', 'F5', 'F6', 'F7', 'F8', 'F9', 'F10', 'F12',
            'Escape', 'Tab', 'Alt', 'Control', 'Meta', 'Windows', 'Command'
        ];

        document.addEventListener('keydown', (e) => {
            if (blockedKeys.includes(e.key)) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }, true);

        // Prevent leaving page accidentally
        window.addEventListener('beforeunload', (e) => {
            if (isStarted) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // ==================== CANVAS BACKGROUND ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Animated background
        let bgShapes = [];
        
        function initBgShapes() {
            bgShapes = [];
            for (let i = 0; i < 20; i++) {
                bgShapes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 50 + 20,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    color: CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)],
                    opacity: Math.random() * 0.3 + 0.1
                });
            }
        }
        
        initBgShapes();
        
        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Floating background shapes
            bgShapes.forEach(shape => {
                shape.x += shape.speedX;
                shape.y += shape.speedY;
                
                if (shape.x < -50) shape.x = canvas.width + 50;
                if (shape.x > canvas.width + 50) shape.x = -50;
                if (shape.y < -50) shape.y = canvas.height + 50;
                if (shape.y > canvas.height + 50) shape.y = -50;
                
                ctx.globalAlpha = shape.opacity;
                ctx.fillStyle = shape.color;
                ctx.beginPath();
                ctx.arc(shape.x, shape.y, shape.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.globalAlpha = 1;
            requestAnimationFrame(animateBg);
        }
        
        animateBg();

        console.log('🎉 Baby Keyboard Smash loaded! Tekan "Mulai!" untuk bermain.');
    </script>
</body>
</html>
